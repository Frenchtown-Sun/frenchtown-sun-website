<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <!-- Allows for certain kinds of responsive css. -->
    <meta name="viewport" content="width=device-width,initial-scale=1">

    <!-- This is the font used in the newsletter.
         This code direct from https://fonts.google.com/selection/embed -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,200..900;1,8..60,200..900&display=swap" rel="stylesheet">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/Sun-96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/Sun.svg" />

    <!-- This lets us change where this is hosted and still calculate the right abspath -->
    {{ with .Site.Params.style_css -}}
      <link rel="stylesheet" href="{{ . | absURL }}">
    {{- end }}

    <title>{{ .Title }}</title>
  </head>
  <body>
    {{- partial "top-nav.html" . -}}

    <div class="content">
      <!-- Pull whatever's in the corresponding content/<something>/_index.md -->
      {{ .Content }}
    </div>
  </body>
</html>
